device: cuda
dataset:
  name: COCO
  format: coco
  dataset_dir: data/coco
  train_ann: data/coco/annotations/instances_train2017.json
  val_ann: data/coco/annotations/instances_val2017.json
  image_size: 640
  class_names: []
model:
  meta_architecture: detr
  name: detr_r50
assignment:
  name: first_box
  detr:
    name: hungarian
train:
  batch_size: 4
  optimizer: adamw
  base_lr: 0.0001
  backbone_lr: 0.00001
  weight_decay: 0.0001
  gradient_clip: 0.1
  output_dir: experiments/detection/detr/exp00
  log_period: 10
  checkpoint_period: 1
validation:
  batch_size: 4
scheduler:
  epochs: 12
  type: multistep
  milestones: [8, 11]
augmentation:
  use_random_horizontal_flip: True
  use_mosaic: False
  use_mixup: False
  normalize: True

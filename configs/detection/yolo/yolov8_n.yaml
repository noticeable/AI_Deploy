device: cuda
dataset:
  name: COCO
  format: coco
  dataset_dir: data/coco
  train_ann: data/coco/annotations/instances_train2017.json
  val_ann: data/coco/annotations/instances_val2017.json
  image_size: 640
  class_names: []
model:
  meta_architecture: yolo
  name: yolov8_n
  yolo:
    block: conv
    strides: [8, 16, 32]
    min_box_size: 0.02
    num_candidates: 16800
    dense_head:
      enabled: True
      type: fpn_multi
      per_cell_boxes: 2
      use_objectness: True
      neck_channels: 128
assignment:
  name: dynamic_k
  box_loss: l1
  iou_variant: iou
  dynamic_k_topk: 10
  yolo:
    name: dynamic_k
train:
  batch_size: 8
  optimizer: adamw
  base_lr: 0.0005
  weight_decay: 0.0001
  output_dir: experiments/detection/yolo/exp00
  log_period: 10
  checkpoint_period: 1
validation:
  batch_size: 8
scheduler:
  epochs: 12
  type: cosine
augmentation:
  use_random_horizontal_flip: True
  use_mosaic: False
  use_mixup: False
  use_label_smoothing: False
  normalize: True
  label_smoothing:
    epsilon: 0.0
eval:
  nms_type: soft
  soft_nms_sigma: 0.5
  soft_nms_score_threshold: 0.01

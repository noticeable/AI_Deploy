model:
  type: cifar
  name: vit
  vit:
    patch_size: 4
    emb_dim: 384
    mlp_dim: 1536
    num_heads: 6
    num_layers: 7
    dropout: 0.0
    attention_dropout: 0.0
    classifier: token
    representation_size: 0
    pretrained: false
    pretrained_path: ''
    pretrained_source: checkpoint
    reset_classifier: true
device: cuda
train:
  seed: 0
  precision: O0
  batch_size: 128
  subdivision: 1
  optimizer: adam
  base_lr: 0.001
  momentum: 0.9
  nesterov: true
  weight_decay: 0.05
  output_dir: experiments/cifar10/vit/exp00
  log_period: 100
  checkpoint_period: 100
  val_ratio: 0.0
  use_test_as_val: true
  use_tensorboard: true
  distributed: false
  dataloader:
    num_workers: 2
    drop_last: true
    pin_memory: false
validation:
  batch_size: 256
  dataloader:
    num_workers: 2
    drop_last: false
    pin_memory: false
scheduler:
  epochs: 300
  type: cosine
tensorboard:
  train_images: false
  val_images: false
  model_params: false
augmentation:
  random_crop:
    padding: 4
    fill: 0
    padding_mode: constant
  random_horizontal_flip:
    prob: 0.5

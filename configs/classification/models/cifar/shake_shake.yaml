model:
  type: cifar
  name: shake_shake
  init_mode: kaiming_fan_out
  shake_shake:
    depth: 26
    initial_channels: 96
device: cuda
train:
  seed: 0
  precision: O0
  batch_size: 128
  subdivision: 1
  optimizer: sgd
  base_lr: 0.2
  momentum: 0.9
  nesterov: true
  weight_decay: 1e-4
  output_dir: experiments/cifar10/shake_shake/exp00
  log_period: 100
  checkpoint_period: 100
  val_ratio: 0.0
  use_test_as_val: true
  use_tensorboard: true
  distributed: false
  dataloader:
    num_workers: 2
    drop_last: true
    pin_memory: false
validation:
  batch_size: 256
  dataloader:
    num_workers: 2
    drop_last: false
    pin_memory: false
scheduler:
  epochs: 1800
  type: cosine
  lr_min_factor: 0.0
tensorboard:
  train_images: false
  val_images: false
  model_params: false
augmentation:
  random_crop:
    padding: 4
    fill: 0
    padding_mode: constant
  random_horizontal_flip:
    prob: 0.5

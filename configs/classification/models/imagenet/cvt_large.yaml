model:
  type: imagenet
  name: cvt
  init_mode: transformer
  cvt:
    patch_size: 7
    emb_dim: 64
    mlp_dim: 256
    num_heads:
    - 1
    - 4
    - 8
    num_layers:
    - 1
    - 4
    - 16
    dropout: 0.0
    attention_dropout: 0.0
    drop_path_rate: 0.1
    classifier: gap
    representation_size: 0
    qkv_bias: true
    stage_dims:
    - 64
    - 256
    - 512
    stage_patch_sizes:
    - 7
    - 3
    - 3
    stage_strides:
    - 4
    - 2
    - 2
    mlp_ratios:
    - 4.0
    - 4.0
    - 4.0
    pretrained: false
    pretrained_path: ''
    pretrained_source: checkpoint
    strict_pretrained_load: false
    reset_classifier: true
    interpolate_position_embedding: true
device: cuda
train:
  resume: false
  seed: 0
  precision: O0
  batch_size: 128
  subdivision: 1
  optimizer: adamw
  base_lr: 0.0005
  momentum: 0.9
  nesterov: true
  weight_decay: 0.05
  no_weight_decay_on_bn: true
  output_dir: experiments/imagenet/cvt_large/exp00
  log_period: 10
  checkpoint_period: 10
  use_tensorboard: true
  distributed: false
  dataloader:
    num_workers: 8
    drop_last: true
    pin_memory: true
validation:
  batch_size: 128
  dataloader:
    num_workers: 8
    drop_last: false
    pin_memory: true
scheduler:
  epochs: 300
  type: cosine
tensorboard:
  train_images: false
  val_images: false
  model_params: false

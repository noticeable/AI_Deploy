model:
  type: imagenet
  name: densenet
  init_mode: kaiming_fan_out
  densenet:
    n_blocks:
    - 6
    - 12
    - 24
    - 16
    block_type: bottleneck
    growth_rate: 32
    drop_rate: 0.0
    compression_rate: 0.5
device: cuda
train:
  resume: false
  seed: 0
  precision: O0
  batch_size: 256
  subdivision: 1
  optimizer: sgd
  base_lr: 0.1
  momentum: 0.9
  nesterov: true
  weight_decay: 1e-4
  output_dir: experiments/imagenet/densenet121/exp00
  log_period: 10
  checkpoint_period: 10
  use_tensorboard: true
  distributed: false
  dataloader:
    num_workers: 8
    drop_last: true
    pin_memory: true
validation:
  batch_size: 256
  dataloader:
    num_workers: 8
    drop_last: false
    pin_memory: true
scheduler:
  epochs: 90
  type: multistep
  milestones:
  - 30
  - 60
  lr_decay: 0.1
tensorboard:
  train_images: false
  val_images: false
  model_params: false

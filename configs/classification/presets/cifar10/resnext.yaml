_base_:
- ../../datasets/cifar10.yaml
- ../../models/cifar/resnext.yaml
device: cuda
train:
  seed: 0
  precision: O0
  batch_size: 128
  subdivision: 1
  optimizer: sgd
  base_lr: 0.1
  momentum: 0.9
  nesterov: true
  weight_decay: 5e-4
  output_dir: experiments/cifar10/resnext/exp00
  log_period: 100
  checkpoint_period: 100
  val_ratio: 0.0
  use_test_as_val: true
  use_tensorboard: true
  distributed: false
  dataloader:
    num_workers: 2
    drop_last: true
    pin_memory: false
validation:
  batch_size: 256
  dataloader:
    num_workers: 2
    drop_last: false
    pin_memory: false
scheduler:
  epochs: 300
  type: multistep
  milestones:
  - 150
  - 225
  lr_decay: 0.1
augmentation:
  use_random_crop: true
  use_random_horizontal_flip: true
  use_cutout: false
  use_random_erasing: false
  use_dual_cutout: false
  use_mixup: false
  use_ricap: false
  use_cutmix: false
  use_label_smoothing: false
  random_crop:
    padding: 4
    fill: 0
    padding_mode: constant
  random_horizontal_flip:
    prob: 0.5
tensorboard:
  train_images: false
  val_images: false
  model_params: false
